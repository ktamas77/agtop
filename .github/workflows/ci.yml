name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Deno: format, lint, type-check, and the full test suite (native TypeScript).
  deno:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # deno check/test resolve @types/node, so node_modules must exist.
      - run: deno install
      - run: deno fmt --check
      - run: deno lint
      - run: deno check main.ts
      - run: deno test -A

  # Node: build the npm dist with tsc and smoke-test the compiled binary.
  node-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node bin/agentop.js --version
      - run: node bin/agentop.js --demo --once --no-color

  # Bun: install + build + smoke-test the compiled binary (Bun runs the Node path).
  bun-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
      - run: bun bin/agentop.js --version
      - run: bun bin/agentop.js --demo --once --no-color
      - run: bun bin/agentop.js --json
